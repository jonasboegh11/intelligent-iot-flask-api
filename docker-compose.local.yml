# Lokalt udviklingsmiljø – bygger image fra kildekode og eksponerer DB
services:
  api:
    build: .
    image: intelligent-iot-flask-api:latest
    volumes:
      - .:/app
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--worker-tmp-dir", "/tmp", "--reload", "app:app"]
    environment:
      FLASK_DEBUG: "true"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    ports:
      - "${API_EXTERNAL_PORT:-5005}:5000"

  db:
    image: mysql:${MYSQL_VERSION}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"